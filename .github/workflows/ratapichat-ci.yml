name: RatAPIChat CI

# Lints and tests RatAPIChat. Tests are pure (no network, no display): only the
# extracted core modules (ratcore, session_store) are imported.

on:
  push:
    paths:
      - "Scripts/RatAPIChat/**"
      - ".github/workflows/ratapichat-ci.yml"
  pull_request:
    paths:
      - "Scripts/RatAPIChat/**"
      - ".github/workflows/ratapichat-ci.yml"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Scripts/RatAPIChat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Test (pytest)
        run: python -m pytest -q
